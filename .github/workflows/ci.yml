name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check one-way package dependency (workspace-engine must never be imported by radar-engine)
        run: ./scripts/check-package-boundaries.sh

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: missa
          POSTGRES_PASSWORD: missa
          POSTGRES_DB: missa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test against a real Postgres connection (radar-adapters)
        run: npm test --workspace=@missa/radar-adapters
        env:
          DATABASE_URL: postgres://missa:missa@localhost:5432/missa_test

      - name: Test against a real Postgres connection (workspace-engine)
        run: npm test --workspace=@missa/workspace-engine
        env:
          DATABASE_URL: postgres://missa:missa@localhost:5432/missa_test
